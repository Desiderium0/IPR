<button (click)="load()">Load todo</button>

<ul>
  @for (td of todo; track td.id) {
  <li>
    {{ td.id }}
  </li>
  <li>
    {{ td.title }}
  </li>
  }
</ul>

<form method="post" [formGroup]="todoFormGroup">
  <div>
    <input type="text" formControlName="title" />
  </div>
  <button (click)="send()" type="submit">Отправить</button>
</form>
